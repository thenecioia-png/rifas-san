# ============================================
# RENDER.COM BLUEPRINT - 24/7 GRATIS CON PING
# ============================================
# NOTA: PostgreSQL y Redis se usan EXTERNOS (Neon + Upstash)
# porque la DB gratis de Render se BORRA a los 30 dias.
#
# ANTES DE DESPLEGAR:
# 1. Crear cuenta en https://render.com (GitHub)
# 2. Crear cuenta en https://neon.tech -> copiar DATABASE_URL
# 3. Crear cuenta en https://upstash.com -> copiar REDIS_URL
# 4. Editar las variables FRONTEND_URL, DATABASE_URL, REDIS_URL abajo
# 5. Subir a GitHub y crear Blueprint en Render
# ============================================

services:
  - type: web
    name: rifas-san-backend
    runtime: docker
    repo: https://github.com/TU_USUARIO/TU_REPO.git
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: HOST
        value: 0.0.0.0
      - key: RENDER
        value: "true"
      - key: SELF_URL
        value: https://rifas-san-backend.onrender.com
      - key: API_PREFIX
        value: /api/v1
      - key: FRONTEND_URL
        value: https://TU_FRONTEND.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
    healthCheckPath: /api/v1/health
    autoDeploy: true
