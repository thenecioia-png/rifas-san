version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rifas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-rifas_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SecureP@ssw0rd2024!}
      POSTGRES_DB: ${DB_NAME:-rifas_san_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/backup:/backup
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rifas_admin} -d ${DB_NAME:-rifas_san_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rifas-network

  redis:
    image: redis:7-alpine
    container_name: rifas-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-RedisSecure2024!}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rifas-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: rifas-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-rifas_admin}:${DB_PASSWORD:-SecureP@ssw0rd2024!}@postgres:5432/${DB_NAME:-rifas_san_db}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-RedisSecure2024!}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    env_file:
      - .env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rifas-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rifas-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - rifas-network

  nginx:
    image: nginx:alpine
    container_name: rifas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - rifas-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  rifas-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
